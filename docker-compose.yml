name: incidentpilot

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: incidentpilot
      POSTGRES_USER: incidentpilot
      POSTGRES_PASSWORD: incidentpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incidentpilot -d incidentpilot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  jaeger:
    image: jaegertracing/all-in-one:1.60
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  api-service:
    build:
      context: ./services/api-service
    environment:
      DATABASE_URL: postgres://incidentpilot:incidentpilot@postgres:5432/incidentpilot?sslmode=disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      API_ADDR: :8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  agent-worker:
    build:
      context: ./services/agent-worker
    environment:
      DATABASE_URL: postgres://incidentpilot:incidentpilot@postgres:5432/incidentpilot?sslmode=disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      AGENT_METRICS_PORT: 9100
      LLM_PROVIDER: ${LLM_PROVIDER:-disabled}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-12}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-700}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
    ports:
      - "9100:9100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  web:
    build:
      context: ./services/web
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - api-service

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api-service
      - agent-worker

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres-data:
  grafana-data:
