name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  api:
    name: Go API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: services/api-service/go.sum
      - name: Test API
        working-directory: services/api-service
        run: go test ./...

  agent:
    name: Python Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/agent-worker/requirements.txt
      - name: Install dependencies
        working-directory: services/agent-worker
        run: pip install -r requirements.txt
      - name: Test agent
        working-directory: services/agent-worker
        run: python -m pytest

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/web/package-lock.json
      - name: Install dependencies
        working-directory: services/web
        run: npm ci
      - name: Build
        working-directory: services/web
        run: npm run build

  compose:
    name: Compose Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose
        run: docker compose config --quiet

